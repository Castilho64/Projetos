<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjeta</title>
</head>
<body>
    <script type ="text/javascript">
        // Um campo para o valor da conta 
        // Um 'SELECT' com opções de gorjeta: 5%, 10%, 15%
        // Um botão calcular
        // Exibir um valor da gorjeta e o valor total a pagar
        function calc_gorjeta(valor, porcentagem){
        return 'R$ ' + (valor * porcentagem / 100).toFixed(2).replace('.', ',')    
        }

        window.onload = function (){
            document.getElementById('btn_calcular').onclick = function(){

                let porcentagem = document.getElementById('porcentagem').value //Captura a opção selecionada
                let valor = document.getElementById('valor').value //Captura o Valor

                let gorjeta = calc_gorjeta(valor, porcentagem)
                let total = 'R$ ' + (parseFloat(valor) + parseFloat(valor) * porcentagem / 100).toFixed(2).replace('.',',')

                let resultado = '<br><br>Gorjeta: ' + gorjeta + '<br> Total a pagar: ' + total

                document.getElementById('resultado').innerHTML = 'Resultado: ' + resultado //Exibe o resultado na página
            }
        }
    </script>
    <h1>Calculadora de Gorjeta</h1>
    <select id="porcentagem">
        <option value="5">5% de Gorjeta</option>
        <option value="10">10% de Gorjeta</option>
        <option value="15">15% de Gorjeta</option>
    </select>
    <b>Valor Total do seu pedido: </b><input type="number" id="valor"><br><br>
    <button id="btn_calcular">Calcular</button>
    <p><b id="resultado">Resultado: </b></p>

    
</body>
</html>
